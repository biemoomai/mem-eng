<svg viewBox="0 0 500 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .wiggle { animation: wiggle 0.5s infinite; transform-origin: center; }
    .bounce { animation: bounce 0.5s infinite; transform-origin: center; }
    .stress { animation: stress 0.1s infinite; transform-origin: center; }
  </style>
  
  <rect width="500" height="800" fill="#ffffff" />
  <text x="250" y="80" text-anchor="middle" font-family="sans-serif" font-size="44" font-weight="bold" fill="#000000">accountant</text>
  
  <!-- Desk -->
  <rect x="100" y="480" width="300" height="15" rx="3" stroke="#000000" stroke-width="3" fill="#ffffff" />
  <rect x="120" y="495" width="20" height="150" stroke="#000000" stroke-width="3" fill="#ffffff" />
  <rect x="360" y="495" width="20" height="150" stroke="#000000" stroke-width="3" fill="#ffffff" />
  
  <!-- Computer -->
  <rect x="250" y="400" width="100" height="80" rx="5" stroke="#000000" stroke-width="3" fill="#3b82f6" fill-opacity="0.2" />
  <text x="300" y="445" text-anchor="middle" font-family="monospace" font-size="20">$ 1,234.56</text>
  
  <!-- Accountant -->
  <g class="stress">
    <circle cx="160" cy="360" r="22" stroke="#000000" stroke-width="3" fill="#ffffff" />
    <!-- Eyes -->
    <circle cx="152" cy="355" r="3" fill="#000000" />
    <circle cx="168" cy="355" r="3" fill="#000000" />
    <!-- Mouth -->
    <path d="M 152 370 Q 160 365 168 370" stroke="#000000" stroke-width="3" fill="none" />
  </g>
  
  <line x1="160" y1="382" x2="160" y2="470" stroke="#000000" stroke-width="3" />
  <!-- Arms -->
  <line x1="160" y1="400" x2="220" y2="440" stroke="#000000" stroke-width="3" />
  <line x1="220" y1="440" x2="260" y2="430" stroke="#000000" stroke-width="3" />
  <!-- Legs -->
  <line x1="160" y1="470" x2="140" y2="580" stroke="#000000" stroke-width="3" />
  <line x1="160" y1="470" x2="180" y2="580" stroke="#000000" stroke-width="3" />
  
  <!-- Floating Money -->
  <g class="bounce">
    <rect x="380" y="300" width="40" height="60" stroke="#000000" stroke-width="3" fill="#10b981" fill-opacity="0.2" />
    <text x="400" y="340" text-anchor="middle" font-size="20">$</text>
  </g>
  
  <!-- Paper stack -->
  <rect x="260" y="460" width="60" height="20" stroke="#000000" stroke-width="3" fill="#ef4444" fill-opacity="0.2" />
  
  <text x="250" y="700" text-anchor="middle" font-family="sans-serif" font-size="20">"We hired an accountant to help us with our taxes."</text>
</svg>