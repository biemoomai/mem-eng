# The client uses Supabase publishable keys. The handler validates the user itself,
# which avoids the legacy JWT gateway rejecting modern sb_publishable_ keys.
[functions.get-word-details]
enabled = true
verify_jwt = false

[functions.line-webhook]
enabled = true
verify_jwt = false
import_map = "./functions/line-webhook/deno.json"
entrypoint = "./functions/line-webhook/index.ts"

[functions.liff-auth]
enabled = true
verify_jwt = false
import_map = "./functions/liff-auth/deno.json"
entrypoint = "./functions/liff-auth/index.ts"